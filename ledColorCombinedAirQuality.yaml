blueprint:
  name: Air Quality LED (Apollo Air-1)
  domain: automation

  input:
    co_sensor:
      selector:
        entity:
          domain: sensor
    co2_sensor:
      selector:
        entity:
          domain: sensor
    pm1_sensor:
      selector:
        entity:
          domain: sensor
    voc_sensor:
      selector:
        entity:
          domain: sensor
    led_light:
      selector:
        entity:
          domain: light

    update_delay:
      name: Update delay (anti-flicker)
      default: "00:00:10"
      selector:
        duration:

    day_brightness:
      name: Day Brightness
      default: 120
      selector:
        number:
          min: 1
          max: 255

    night_brightness:
      name: Night Brightness
      default: 30
      selector:
        number:
          min: 1
          max: 255

    night_start:
      name: Night Start Time
      default: "22:00:00"
      selector:
        time:

    night_end:
      name: Night End Time
      default: "06:00:00"
      selector:
        time:

    color_stage_1:
      name: Stage 1 Color
      default: [0, 255, 0]
      selector:
        color_rgb:

    color_stage_2:
      name: Stage 2 Color
      default: [255, 200, 0]
      selector:
        color_rgb:

    color_stage_3:
      name: Stage 3 Color
      default: [255, 0, 0]
      selector:
        color_rgb:

    co_stage_2:
      name: CO Stage 2 Threshold
      default: 5
      selector:
        number:
          min: 0
          max: 50
    co_stage_3:
      name: CO Stage 3 Threshold
      default: 10
      selector:
        number:
          min: 0
          max: 100

    co2_stage_2:
      default: 800
      selector:
        number:
          min: 400
          max: 2000
    co2_stage_3:
      default: 1200
      selector:
        number:
          min: 400
          max: 5000

    pm1_stage_2:
      default: 10
      selector:
        number:
          min: 0
          max: 100
    pm1_stage_3:
      default: 25
      selector:
        number:
          min: 0
          max: 200

    voc_stage_2:
      default: 200
      selector:
        number:
          min: 0
          max: 1000
    voc_stage_3:
      default: 400
      selector:
        number:
          min: 0
          max: 2000

trigger:
  - platform: state
    entity_id:
      - !input co_sensor
      - !input co2_sensor
      - !input pm1_sensor
      - !input voc_sensor
    for: !input update_delay

  - platform: time
    at: !input night_start
  - platform: time
    at: !input night_end

variables:
  co_entity: !input co_sensor
  co2_entity: !input co2_sensor
  pm1_entity: !input pm1_sensor
  voc_entity: !input voc_sensor

  co: "{{ states(co_entity) | float(0) }}"
  co2: "{{ states(co2_entity) | float(0) }}"
  pm1: "{{ states(pm1_entity) | float(0) }}"
  voc: "{{ states(voc_entity) | float(0) }}"

  co_stage_2: !input co_stage_2
  co_stage_3: !input co_stage_3
  co2_stage_2: !input co2_stage_2
  co2_stage_3: !input co2_stage_3
  pm1_stage_2: !input pm1_stage_2
  pm1_stage_3: !input pm1_stage_3
  voc_stage_2: !input voc_stage_2
  voc_stage_3: !input voc_stage_3

  color_stage_1: !input color_stage_1
  color_stage_2: !input color_stage_2
  color_stage_3: !input color_stage_3

  day_brightness: !input day_brightness
  night_brightness: !input night_brightness
  night_start: !input night_start
  night_end: !input night_end

  is_night: >
    {% set now = now().time() %}
    {% set start = strptime(night_start, "%H:%M:%S").time() %}
    {% set end = strptime(night_end, "%H:%M:%S").time() %}

    {% if start < end %}
      {{ start <= now < end }}
    {% else %}
      {{ now >= start or now < end }}
    {% endif %}

  brightness: >
    {% if is_night %}
      {{ night_brightness }}
    {% else %}
      {{ day_brightness }}
    {% endif %}

  state_level: >
    {% set stage_3 =
      co > co_stage_3 or
      co2 > co2_stage_3 or
      pm1 > pm1_stage_3 or
      voc > voc_stage_3
    %}
    {% set stage_2 =
      co > co_stage_2 or
      co2 > co2_stage_2 or
      pm1 > pm1_stage_2 or
      voc > voc_stage_2
    %}

    {% if stage_3 %}
      stage_3
    {% elif stage_2 %}
      stage_2
    {% else %}
      stage_1
    {% endif %}

action:
  - choose:
      - conditions: "{{ state_level == 'stage_1' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input led_light
            data:
              rgb_color: "{{ color_stage_1 }}"
              brightness: "{{ brightness | int }}"

      - conditions: "{{ state_level == 'stage_2' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input led_light
            data:
              rgb_color: "{{ color_stage_2 }}"
              brightness: "{{ brightness | int }}"

      - conditions: "{{ state_level == 'stage_3' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input led_light
            data:
              rgb_color: "{{ color_stage_3 }}"
              brightness: "{{ brightness | int }}"
