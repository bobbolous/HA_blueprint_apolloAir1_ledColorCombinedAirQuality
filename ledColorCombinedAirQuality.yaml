blueprint:
  name: Air Quality LED (Apollo Air-1)
  domain: automation

  input:
    co_sensor:
      name: CO Sensor
      description: Select the respective carbon monoxide sensor
      selector:
        entity:
          domain: sensor
    co2_sensor:
      name: CO2 Sensor
      description: Select the respective carbon dioxide sensor
      selector:
        entity:
          domain: sensor
    pm_sensor:
      name: PM Sensor
      description: Select the respective particulate matter sensor (suggest to use PM <10µm)
      selector:
        entity:
          domain: sensor
    voc_sensor:
      name: VOC Sensor
      description: Select the respective numeric volatile organic compound sensor.
      selector:
        entity:
          domain: sensor
    led_light:
      name: LED Light
      description: Select the LED that shall be used as indicator.
      selector:
        entity:
          domain: light

    update_delay:
      name: Update delay (anti-flicker)
      description: Choose a delay to avoid flickering of the LED. All changes will be delayed for that time.
      default: "00:01:00"
      selector:
        duration:

    day_brightness:
      name: Day Brightness
      description: Choose the brightness of the LED during the defined day time. CAUTION: values below 35 seem to affect the actual light color.
      default: 128
      selector:
        number:
          min: 0
          max: 255

    night_brightness:
      name: Night Brightness
      description: Choose the brightness of the LED during the defined night time. CAUTION: values below 35 seem to affect the actual light color. With 0 the LED will be Off.
      default: 35
      selector:
        number:
          min: 0
          max: 255

    night_start:
      name: Night Start Time
      description: After this time the value of the Night Brightness will be applied.
      default: "22:00:00"
      selector:
        time:

    night_end:
      name: Night End Time
      description: After this time the value of the Day Brightness will be applied.
      default: "06:00:00"
      selector:
        time:

    color_stage_1:
      name: Stage 1 Color
      description: Use e.g. green or blue.
      default: [0, 255, 0]
      selector:
        color_rgb:

    color_stage_2:
      name: Stage 2 Color
      description: Use e.g. yellow.
      default: [255, 200, 0]
      selector:
        color_rgb:

    color_stage_3:
      name: Stage 3 Color
      description: Use e.g. red.
      default: [255, 0, 0]
      selector:
        color_rgb:

    co_stage_2:
      name: CO Stage 2 Threshold
      default: 5
      selector:
        number:
          min: 0
          max: 50
    co_stage_3:
      name: CO Stage 3 Threshold
      default: 10
      selector:
        number:
          min: 0
          max: 100

    co2_stage_2:
      name: CO2 Stage 2 Threshold
      default: 1000
      selector:
        number:
          min: 0
          max: 2000
    co2_stage_3:
      name: CO2 Stage 3 Threshold
      default: 2000
      selector:
        number:
          min: 0
          max: 4000

    pm_stage_2:
      name: PM Stage 2 Threshold
      default: 100
      selector:
        number:
          min: 0
          max: 400
    pm_stage_3:
      name: PM Stage 3 Threshold
      default: 1000
      selector:
        number:
          min: 0
          max: 2000

    voc_stage_2:
      name: VOC Stage 2 Threshold
      default: 120
      selector:
        number:
          min: 0
          max: 400
    voc_stage_3:
      name: VOC Stage 3 Threshold
      default: 250
      selector:
        number:
          min: 0
          max: 400

trigger:
  - platform: state
    entity_id:
      - !input co_sensor
      - !input co2_sensor
      - !input pm_sensor
      - !input voc_sensor
    for: !input update_delay

  - platform: time
    at: !input night_start
  - platform: time
    at: !input night_end

variables:
  co_entity: !input co_sensor
  co2_entity: !input co2_sensor
  pm_entity: !input pm_sensor
  voc_entity: !input voc_sensor

  co: "{{ states(co_entity) | float(0) }}"
  co2: "{{ states(co2_entity) | float(0) }}"
  pm: "{{ states(pm_entity) | float(0) }}"
  voc: "{{ states(voc_entity) | float(0) }}"

  co_stage_2: !input co_stage_2
  co_stage_3: !input co_stage_3
  co2_stage_2: !input co2_stage_2
  co2_stage_3: !input co2_stage_3
  pm_stage_2: !input pm_stage_2
  pm_stage_3: !input pm_stage_3
  voc_stage_2: !input voc_stage_2
  voc_stage_3: !input voc_stage_3

  color_stage_1: !input color_stage_1
  color_stage_2: !input color_stage_2
  color_stage_3: !input color_stage_3

  day_brightness: !input day_brightness
  night_brightness: !input night_brightness
  night_start: !input night_start
  night_end: !input night_end

  is_night: >
    {% set now = now().time() %}
    {% set start = strptime(night_start, "%H:%M:%S").time() %}
    {% set end = strptime(night_end, "%H:%M:%S").time() %}

    {% if start < end %}
      {{ start <= now < end }}
    {% else %}
      {{ now >= start or now < end }}
    {% endif %}

  brightness: >
    {% if is_night %}
      {{ night_brightness }}
    {% else %}
      {{ day_brightness }}
    {% endif %}

  state_level: >
    {% set stage_3 =
      co > co_stage_3 or
      co2 > co2_stage_3 or
      pm > pm_stage_3 or
      voc > voc_stage_3
    %}
    {% set stage_2 =
      co > co_stage_2 or
      co2 > co2_stage_2 or
      pm > pm_stage_2 or
      voc > voc_stage_2
    %}

    {% if stage_3 %}
      stage_3
    {% elif stage_2 %}
      stage_2
    {% else %}
      stage_1
    {% endif %}

action:
  - choose:
      - conditions: "{{ state_level == 'stage_1' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input led_light
            data:
              rgb_color: "{{ color_stage_1 }}"
              brightness: "{{ brightness | int }}"

      - conditions: "{{ state_level == 'stage_2' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input led_light
            data:
              rgb_color: "{{ color_stage_2 }}"
              brightness: "{{ brightness | int }}"

      - conditions: "{{ state_level == 'stage_3' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input led_light
            data:
              rgb_color: "{{ color_stage_3 }}"
              brightness: "{{ brightness | int }}"
