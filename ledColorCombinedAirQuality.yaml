blueprint:
  name: Air Quality LED (Apollo Air-1)
  domain: automation

  input:
    co_sensor:
      selector:
        entity:
          domain: sensor
    co2_sensor:
      selector:
        entity:
          domain: sensor
    pm1_sensor:
      selector:
        entity:
          domain: sensor
    voc_sensor:
      selector:
        entity:
          domain: sensor
    led_light:
      selector:
        entity:
          domain: light

    update_delay:
      name: Update delay (anti-flicker)
      description: Time the value must stay changed before updating LED
      default: "00:00:10"
      selector:
        duration:

    co_yellow:
      default: 5
      selector:
        number:
          min: 0
          max: 50
    co_red:
      default: 10
      selector:
        number:
          min: 0
          max: 100

    co2_yellow:
      default: 800
      selector:
        number:
          min: 400
          max: 2000
    co2_red:
      default: 1200
      selector:
        number:
          min: 400
          max: 5000

    pm1_yellow:
      default: 10
      selector:
        number:
          min: 0
          max: 100
    pm1_red:
      default: 25
      selector:
        number:
          min: 0
          max: 200

    voc_yellow:
      default: 200
      selector:
        number:
          min: 0
          max: 1000
    voc_red:
      default: 400
      selector:
        number:
          min: 0
          max: 2000

trigger:
  - platform: state
    entity_id:
      - !input co_sensor
      - !input co2_sensor
      - !input pm1_sensor
      - !input voc_sensor
    for: !input update_delay

variables:
  co_entity: !input co_sensor
  co2_entity: !input co2_sensor
  pm1_entity: !input pm1_sensor
  voc_entity: !input voc_sensor

  co: "{{ states(co_entity) | float(0) }}"
  co2: "{{ states(co2_entity) | float(0) }}"
  pm1: "{{ states(pm1_entity) | float(0) }}"
  voc: "{{ states(voc_entity) | float(0) }}"

  co_yellow: !input co_yellow
  co_red: !input co_red
  co2_yellow: !input co2_yellow
  co2_red: !input co2_red
  pm1_yellow: !input pm1_yellow
  pm1_red: !input pm1_red
  voc_yellow: !input voc_yellow
  voc_red: !input voc_red

  state_level: >
    {% set red =
      co > co_red or
      co2 > co2_red or
      pm1 > pm1_red or
      voc > voc_red
    %}
    {% set yellow =
      co > co_yellow or
      co2 > co2_yellow or
      pm1 > pm1_yellow or
      voc > voc_yellow
    %}

    {% if red %}
      red
    {% elif yellow %}
      yellow
    {% else %}
      green
    {% endif %}

action:
  - choose:
      - conditions: "{{ state_level == 'green' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input led_light
            data:
              rgb_color: [0, 255, 0]

      - conditions: "{{ state_level == 'yellow' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input led_light
            data:
              rgb_color: [255, 200, 0]

      - conditions: "{{ state_level == 'red' }}"
        sequence:
          - service: light.turn_on
            target:
              entity_id: !input led_light
            data:
              rgb_color: [255, 0, 0]
